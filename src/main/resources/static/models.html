<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mins Bot · Local Models</title>
  <style>
    :root {
      --bg: #0b0b10;
      --panel: #141420;
      --panel-2: #1c1c2b;
      --border: rgba(255,255,255,0.08);
      --text: #f4f4f5;
      --muted: rgba(255,255,255,0.55);
      --muted-2: rgba(255,255,255,0.35);
      --accent: #818cf8;
      --accent-bg: rgba(129,140,248,0.15);
      --ok: #86efac;
      --warn: #fbbf24;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.top {
      position: sticky; top: 0; z-index: 5;
      background: linear-gradient(180deg, rgba(11,11,16,0.95), rgba(11,11,16,0.85));
      border-bottom: 1px solid var(--border);
      padding: 18px 28px; backdrop-filter: blur(8px);
    }
    header.top h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    header.top .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 28px 80px; }

    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .sum-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px;
    }
    .sum-card .lbl { font-size: 10px; color: var(--muted-2); text-transform: uppercase;
      letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
    .sum-card .val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .sum-card .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle; }
    .dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(134,239,172,0.5); }
    .dot.warn { background: var(--warn); }
    .dot.err { background: var(--err); }

    section.cat { margin-bottom: 36px; }
    section.cat h2 { font-size: 15px; margin: 0 0 4px; letter-spacing: -0.01em; }
    section.cat .cat-desc { color: var(--muted); font-size: 12.5px; margin-bottom: 14px; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .model {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
      transition: border-color 0.15s, transform 0.15s;
    }
    .model:hover { border-color: rgba(255,255,255,0.18); }
    .model.installed { border-color: rgba(134,239,172,0.35); background: linear-gradient(180deg, rgba(134,239,172,0.04), var(--panel)); }
    .model .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .model .name { font-weight: 600; font-size: 14.5px; }
    .model .size { color: var(--muted); font-size: 11.5px; font-variant-numeric: tabular-nums; }
    .model .tag { color: var(--muted-2); font-size: 11px; font-family: ui-monospace, monospace; }
    .model .desc { color: var(--muted); font-size: 12.5px; min-height: 36px; }
    .model .vs {
      font-size: 11.5px; color: rgba(255,255,255,0.7);
      background: rgba(129,140,248,0.07); border: 1px solid rgba(129,140,248,0.18);
      border-radius: 8px; padding: 8px 10px; line-height: 1.45;
    }
    .model .vs-label {
      display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent);
      background: var(--accent-bg); border-radius: 4px; padding: 2px 6px;
      margin-right: 6px; vertical-align: 1px;
    }

    .model-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(129,140,248,0.3);
      padding: 6px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .btn:hover { background: rgba(129,140,248,0.25); border-color: rgba(129,140,248,0.5); }
    .btn.danger { color: var(--err); background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); }
    .btn.danger:hover { background: rgba(248,113,113,0.2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .badge-installed { color: var(--ok); font-size: 11.5px; font-weight: 600; }
    .badge-default {
      display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--accent); background: var(--accent-bg);
      border: 1px solid rgba(129,140,248,0.35); border-radius: 4px;
      padding: 1px 6px; vertical-align: middle; margin-left: 4px;
    }
    .model.is-default { border-color: rgba(129,140,248,0.4); }
    .installed-chip .desc { color: var(--accent); }
    .installed-chip:hover { border-color: rgba(129,140,248,0.5); }

    .progress {
      height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;
      margin-top: 2px;
    }
    .progress-fill { height: 100%; background: var(--accent); width: 0%;
      transition: width 0.2s ease-out; }
    .progress-text { font-size: 11px; color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }

    .ollama-banner {
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .ollama-banner.err { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); }
    .ollama-banner .msg { flex: 1; font-size: 13px; }
    .ollama-banner .msg strong { color: var(--text); }

    .coming-soon {
      margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
      color: var(--muted-2); font-size: 12.5px;
    }
    .coming-soon .cs-title { color: var(--muted); font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10.5px; }
    .coming-soon ul { margin: 0; padding-left: 18px; }

    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 10;
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slidein 0.2s ease-out;
    }
    .toast.err { border-color: rgba(248,113,113,0.4); }
    .toast.ok { border-color: rgba(134,239,172,0.4); }
    @keyframes slidein { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .loading { color: var(--muted); text-align: center; padding: 40px; }

    /* Quick filter chips */
    .filters {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 24px; padding: 12px 14px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    }
    .filter-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted-2); font-weight: 600; align-self: center; margin-right: 4px;
    }
    .chip {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 12px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.12s;
      font-family: inherit;
    }
    .chip:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .chip.active {
      background: var(--accent-bg); color: var(--accent);
      border-color: rgba(129,140,248,0.45);
    }
    .chip .count { opacity: 0.6; margin-left: 4px; font-variant-numeric: tabular-nums; }

    /* GPU / hardware badges on model cards */
    .hw-row { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; }
    .hw-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 6px; font-weight: 500;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
    }
    .hw-badge.gpu-ok {
      background: rgba(134,239,172,0.08); color: var(--ok);
      border-color: rgba(134,239,172,0.25);
    }
    .hw-badge.gpu-tight {
      background: rgba(251,191,36,0.08); color: var(--warn);
      border-color: rgba(251,191,36,0.25);
    }
    .hw-badge.gpu-no {
      background: rgba(248,113,113,0.08); color: var(--err);
      border-color: rgba(248,113,113,0.25);
    }
    .hw-badge.gpu-neutral {
      background: rgba(255,255,255,0.04); color: var(--muted);
      border-color: var(--border);
    }
    .hw-badge.cpu-ok {
      background: rgba(255,255,255,0.04); color: var(--muted);
      border-color: var(--border);
    }

    .model.cant-run { opacity: 0.6; }
    .model.cant-run .name { color: var(--muted); }

    .empty-state {
      text-align: center; color: var(--muted); padding: 48px 20px;
      background: var(--panel); border: 1px dashed var(--border); border-radius: 12px;
    }
    .empty-state .em-hint { font-size: 12px; color: var(--muted-2); margin-top: 6px; }

    /* ComfyUI install modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 20; padding: 20px;
    }
    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; max-width: 560px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .modal h3 { margin: 0 0 6px; font-size: 17px; }
    .modal .modal-sub { color: var(--muted); font-size: 12.5px; margin-bottom: 16px; }
    .modal .step-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--accent); font-weight: 700; margin-top: 16px; margin-bottom: 6px;
    }
    .modal pre {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; margin: 0;
      font-family: ui-monospace, monospace; font-size: 12px;
      overflow-x: auto; color: var(--text);
    }
    .modal .modal-actions {
      display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px;
    }
    .modal .small-note {
      font-size: 11.5px; color: var(--muted-2); margin-top: 8px;
    }
  </style>
</head>
<body>

<header class="top">
  <h1>Local AI Models</h1>
  <div class="sub">Install, download, and remove models served locally via <a href="https://ollama.com" target="_blank" rel="noopener">Ollama</a>. Everything on this page runs on your machine.</div>
</header>

<div class="wrap">
  <div id="summary" class="summary"></div>
  <div id="ollama-banner-slot"></div>
  <div id="comfyui-banner-slot"></div>
  <div id="filters" class="filters" style="display:none;"></div>
  <div id="catalog" class="loading">Loading catalog…</div>
  <div id="coming-soon-slot"></div>
</div>

<div id="modal-slot"></div>

<script src="js/models.js?v=2"></script>
</body>
</html>
