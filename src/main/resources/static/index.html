<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mins Bot</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="root" class="expanded">
    <div id="panel" class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="ball-container"><div class="ball" aria-hidden="true"></div></div>
          <span class="panel-title">Mins Bot</span>
          <div id="header-thinking" class="header-thinking" hidden aria-hidden="true" title="Processing...">
            <svg class="header-ecg" viewBox="0 0 32 12" aria-hidden="true">
              <path class="header-ecg-line" d="M0 6 L8 6 L10 2 L12 6 L14 6 L16 10 L18 6 L32 6" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="panel-actions">
          <button type="button" id="clear-btn" class="btn-icon btn-clear" title="Clear chat" aria-label="Clear chat">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M9 4h6a1 1 0 0 1 1 1v1H8V5a1 1 0 0 1 1-1ZM4 7h16"/>
              <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab active" data-tab="chat">Chat</button>
        <button class="tab" data-tab="browser">Browser</button>
      </div>
      <div id="tab-chat" class="tab-content active">
        <div id="messages" class="messages" role="log" aria-live="polite"></div>
        <div id="quit-countdown" class="quit-countdown" aria-live="polite" hidden>
          <span id="quit-countdown-label" class="quit-countdown-label">Quitting in 30s</span>
          <div class="quit-countdown-track"><div id="quit-countdown-fill" class="quit-countdown-fill"></div></div>
        </div>
        <div class="input-row">
          <input type="text" id="input" class="input" placeholder="Ask me anything..." autocomplete="off" aria-label="Message input">
          <button type="button" id="voice-btn" class="btn btn-voice" title="Voice off" aria-label="Toggle voice input">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V6a3 3 0 0 0-3-3Z"></path>
              <path d="M5 11a1 1 0 1 1 2 0 5 5 0 1 0 10 0 1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-3.07A7 7 0 0 1 5 11Z"></path>
            </svg>
          </button>
          <button type="button" id="send-btn" class="btn btn-send" title="Send" aria-label="Send message">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94l18-8.5a.75.75 0 0 0 0-1.38l-18-8.5Z"/>
            </svg>
          </button>
        </div>
        <div id="voice-status" class="voice-status" aria-live="polite" hidden></div>
      </div>
      <div id="tab-browser" class="tab-content">
        <div class="browser-toolbar">
          <button id="browser-back" class="browser-nav-btn" title="Back">&#9664;</button>
          <button id="browser-forward" class="browser-nav-btn" title="Forward">&#9654;</button>
          <button id="browser-refresh" class="browser-nav-btn" title="Refresh">&#8635;</button>
          <input id="browser-url" type="text" class="browser-url-input" placeholder="Enter URL..." autocomplete="off">
          <button id="browser-go" class="browser-nav-btn browser-go-btn">Go</button>
        </div>
        <div class="browser-viewport">
          <img id="browser-frame" alt="Browser view" draggable="false">
          <div id="browser-empty" class="browser-empty">No page loaded. Enter a URL or let the AI browse.</div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
