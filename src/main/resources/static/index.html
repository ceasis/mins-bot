<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mins Bot</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="root" class="expanded">
    <header id="title-bar" class="title-bar">
      <div class="title-bar-drag">
        <span class="title-bar-glow"></span>
        <span class="title-bar-app-name">Mins Bot</span>
      </div>
      <div class="title-bar-controls">
        <button type="button" id="title-bar-minimize" class="title-bar-btn" title="Minimize" aria-label="Minimize">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="0" y="5" width="12" height="1" fill="currentColor"/></svg>
        </button>
        <button type="button" id="title-bar-close" class="title-bar-btn title-bar-close" title="Close" aria-label="Close">
          <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
        </button>
      </div>
    </header>
    <div id="panel" class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="ball-container"><div class="ball" aria-hidden="true"></div></div>
          <span class="panel-title">Mins Bot</span>
          <div id="header-thinking" class="header-thinking" hidden aria-hidden="true" title="Processing...">
            <svg class="header-ecg" viewBox="0 0 32 12" aria-hidden="true">
              <path class="header-ecg-line" d="M0 6 L8 6 L10 2 L12 6 L14 6 L16 10 L18 6 L32 6" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <button type="button" id="header-watch" class="header-watch-btn" title="Toggle watch mode" aria-label="Toggle watch mode">
            <svg class="watch-eye-svg" viewBox="0 0 24 16" aria-hidden="true">
              <path class="watch-eye-outline" d="M1 8 C5 2, 10 0, 12 0 C14 0, 19 2, 23 8 C19 14, 14 16, 12 16 C10 16, 5 14, 1 8Z" fill="none" stroke-width="1.5"/>
              <circle class="watch-eye-iris" cx="12" cy="8" r="3.5"/>
              <circle class="watch-eye-pupil" cx="12" cy="8" r="1.2"/>
            </svg>
          </button>
          <button type="button" id="header-control" class="header-control-btn" title="Allow bot to use keyboard &amp; mouse" aria-label="Toggle keyboard and mouse control">
            <svg class="control-kbd-svg" viewBox="0 0 22 16" aria-hidden="true">
              <rect class="control-kbd-body" x="1" y="1" width="20" height="14" rx="2" fill="none" stroke-width="1.3"/>
              <line class="control-kbd-key" x1="5" y1="5" x2="7" y2="5" stroke-width="1.2" stroke-linecap="round"/>
              <line class="control-kbd-key" x1="9.5" y1="5" x2="12.5" y2="5" stroke-width="1.2" stroke-linecap="round"/>
              <line class="control-kbd-key" x1="15" y1="5" x2="17" y2="5" stroke-width="1.2" stroke-linecap="round"/>
              <line class="control-kbd-key" x1="5" y1="8.5" x2="7" y2="8.5" stroke-width="1.2" stroke-linecap="round"/>
              <line class="control-kbd-key" x1="15" y1="8.5" x2="17" y2="8.5" stroke-width="1.2" stroke-linecap="round"/>
              <line class="control-kbd-key" x1="7" y1="12" x2="15" y2="12" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <button type="button" id="header-listen" class="header-listen-btn" title="Listen to system audio" aria-label="Toggle audio listening">
            <i class="fa-solid fa-headphones listen-icon"></i>
          </button>
          <button type="button" id="listen-dur-down" class="listen-dur-btn" title="Decrease duration" aria-label="Decrease capture duration">−</button>
          <span id="listen-dur-label" class="listen-dur-label">4s</span>
          <button type="button" id="listen-dur-up" class="listen-dur-btn" title="Increase duration" aria-label="Increase capture duration">+</button>
          <button type="button" id="header-mouth" class="header-mouth-btn" title="Speak translations aloud" aria-label="Toggle vocal mode">
            <i class="fa-solid fa-volume-high mouth-icon"></i>
          </button>
        </div>
        <div class="panel-actions">
          <button type="button" id="clear-btn" class="btn-icon btn-clear" title="Clear chat" aria-label="Clear chat">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 8v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8M9 4h6a1 1 0 0 1 1 1v1H8V5a1 1 0 0 1 1-1ZM4 7h16"/>
              <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab active" data-tab="chat">Chat</button>
        <button class="tab" data-tab="browser">Browser</button>
        <button class="tab" data-tab="skills">Skills</button>
        <button class="tab" data-tab="schedules">Schedules</button>
        <button class="tab" data-tab="todos">Todo</button>
        <button class="tab" data-tab="directives">Directives</button>
      </div>
      <div id="tab-chat" class="tab-content active">
        <div class="chat-area">
          <div id="messages" class="messages" role="log" aria-live="polite"></div>
          <div id="watch-feed" class="watch-feed" hidden>
            <div class="watch-feed-inner" id="watch-feed-inner"></div>
          </div>
          <div id="listen-feed" class="listen-feed" hidden>
            <div class="listen-feed-inner" id="listen-feed-inner"></div>
          </div>
        </div>
        <div id="quit-countdown" class="quit-countdown" aria-live="polite" hidden>
          <span id="quit-countdown-label" class="quit-countdown-label">Quitting in 30s</span>
          <div class="quit-countdown-track"><div id="quit-countdown-fill" class="quit-countdown-fill"></div></div>
        </div>
        <div class="input-row">
          <input type="text" id="input" class="input" placeholder="Ask me anything..." autocomplete="off" aria-label="Message input">
          <button type="button" id="voice-btn" class="btn btn-voice" title="Voice off" aria-label="Toggle voice input">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V6a3 3 0 0 0-3-3Z"></path>
              <path d="M5 11a1 1 0 1 1 2 0 5 5 0 1 0 10 0 1 1 0 1 1 2 0 7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-3.07A7 7 0 0 1 5 11Z"></path>
            </svg>
          </button>
          <button type="button" id="send-btn" class="btn btn-send" title="Send" aria-label="Send message">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94l18-8.5a.75.75 0 0 0 0-1.38l-18-8.5Z"/>
            </svg>
          </button>
        </div>
        <div id="voice-status" class="voice-status" aria-live="polite" hidden></div>
      </div>
      <div id="tab-browser" class="tab-content">
        <div class="browser-toolbar">
          <button id="browser-back" class="browser-nav-btn" title="Back">&#9664;</button>
          <button id="browser-forward" class="browser-nav-btn" title="Forward">&#9654;</button>
          <button id="browser-refresh" class="browser-nav-btn" title="Refresh">&#8635;</button>
          <input id="browser-url" type="text" class="browser-url-input" placeholder="Enter URL..." autocomplete="off">
          <button id="browser-go" class="browser-nav-btn browser-go-btn">Go</button>
        </div>
        <div class="browser-viewport">
          <img id="browser-frame" alt="Browser view" draggable="false">
          <div id="browser-empty" class="browser-empty">No page loaded. Enter a URL or let the AI browse.</div>
        </div>
      </div>
      <div id="tab-skills" class="tab-content">
        <div class="skills-container">
          <div id="upload-area" class="upload-area">
            <svg class="upload-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4m0 0L8 8m4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="upload-text">Drop .jar plugin here or click to browse</span>
            <input type="file" id="skill-file-input" accept=".jar" hidden>
          </div>
          <div id="skills-list" class="skills-list"></div>
          <div class="section-divider"></div>
          <div class="publish-section">
            <div class="section-title">Publish a Skill</div>
            <input type="text" id="publish-author" class="tab-input" placeholder="Author name">
            <input type="text" id="publish-desc" class="tab-input" placeholder="Description (optional)">
            <div class="publish-row">
              <input type="file" id="publish-file" accept=".java" class="tab-input file-input">
              <button id="publish-btn" class="action-btn publish">Publish</button>
            </div>
          </div>
          <div id="published-list" class="skills-list"></div>
        </div>
      </div>
      <div id="tab-schedules" class="tab-content">
        <div class="tab-scroll-container" id="schedules-container">
          <div class="tab-empty">Loading schedules...</div>
        </div>
      </div>
      <div id="tab-todos" class="tab-content">
        <div class="tab-scroll-container" id="todos-container">
          <div class="tab-empty">Loading tasks...</div>
        </div>
      </div>
      <div id="tab-directives" class="tab-content">
        <div class="tab-scroll-container" id="directives-list">
          <div class="tab-empty">Loading directives...</div>
        </div>
        <div class="input-row directive-input-row">
          <input type="text" id="directive-input" class="input" placeholder="Add a directive..." autocomplete="off">
          <button type="button" id="directive-add-btn" class="btn btn-send" title="Add">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
