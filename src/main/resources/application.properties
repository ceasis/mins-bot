# ─── GitHub API Integration ──────────────────────────────────────────────────
# Personal Access Token for GitHub REST API v3. Set via env var or application-secrets.properties.
app.github.token=${GITHUB_TOKEN:}

# ─── Google Veo (text-to-video via Gemini API) ───────────────────────────────
# Uses your existing gemini.api.key. Veo is a paid Gemini feature — billing applies.
# Override the model name if Google ships a newer version (e.g. veo-3.5-...).
app.veo.model=veo-3.0-generate-preview

# ─── HeyGen AI (video / avatar generation) ───────────────────────────────────
# Get your key at https://app.heygen.com/settings/subscriptions → API.
# Paste under Setup tab → Video AI (HeyGen), or set here / via env var.
# Optional defaults: pick a favourite avatar + voice so "create a video of me saying X"
# just works without specifying IDs each time.
app.heygen.api-key=${HEYGEN_API_KEY:}
app.heygen.default-avatar-id=
app.heygen.default-voice-id=

# ─── Spotify Web API (real playback control) ─────────────────────────────────
# Register an app at https://developer.spotify.com/dashboard and add this redirect URI:
#   http://127.0.0.1:${server.port}/api/integrations/spotify/oauth2/callback
# Paste the client ID and secret here or in application-secrets.properties.
# Requires a Spotify Premium account for play/pause control.
app.spotify.client-id=${SPOTIFY_CLIENT_ID:}
app.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
# app.spotify.redirect-uri=http://127.0.0.1:8765/api/integrations/spotify/oauth2/callback

# ─── Chrome CDP (real browser control) ────────────────────────────────────────
# Connect to the user's real Chrome browser via Chrome DevTools Protocol.
# On first use, Chrome is relaunched with --remote-debugging-port if needed.
app.cdp.enabled=true
app.cdp.port=9222
# Chrome path (empty = auto-detect standard install locations):
# app.cdp.chrome-path=C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe

# ─── Skills ──────────────────────────────────────────────────────────────────
# Skills are portable sub-packages under com.minsbot.skills.<name>.
# Copy the skill package + these properties to add a skill to another instance.

# Disk Scan — browse and search the local file system
# Endpoints: /api/skills/diskscan/*
app.skills.diskscan.enabled=false
app.skills.diskscan.max-depth=20
app.skills.diskscan.max-results=500
# Additional paths to block (beyond built-in OS system paths):
# app.skills.diskscan.blocked-paths[0]=C:\\SensitiveFolder

# Encoder — base64/hex/url encode and decode
# Endpoints: /api/skills/encoder/{encode,decode}
app.skills.encoder.enabled=false
app.skills.encoder.max-input-bytes=5000000

# HashCalc — MD5/SHA-1/SHA-256/SHA-512 of strings or files
# Endpoints: /api/skills/hashcalc/{string,file,verify}
app.skills.hashcalc.enabled=false
app.skills.hashcalc.max-file-bytes=500000000

# JSON Tools — validate, pretty-print, minify, describe JSON
# Endpoints: /api/skills/jsontools/{validate,pretty,minify,describe}
app.skills.jsontools.enabled=false
app.skills.jsontools.max-input-bytes=5000000

# Regex Tester — test patterns against sample text
# Endpoints: /api/skills/regextester/{test,replace}
app.skills.regextester.enabled=false
app.skills.regextester.max-input-bytes=1000000
app.skills.regextester.max-matches=1000
app.skills.regextester.timeout-ms=2000

# Random Generator — UUIDs, integers, dice, passwords, random picks
# Endpoints: /api/skills/randomgen/{uuid,int,dice,password,choose}
app.skills.randomgen.enabled=false
app.skills.randomgen.max-count=1000
app.skills.randomgen.max-string-length=4096

# Unit Converter — length/weight/time/data/temperature
# Endpoints: /api/skills/unitconvert/{convert,categories}
app.skills.unitconvert.enabled=false

# Notes — quick CRUD notes with tags and search
# Endpoints: /api/skills/notes (+ /{id}, /search)
app.skills.notes.enabled=false
app.skills.notes.storage-dir=memory/notes
app.skills.notes.max-body-chars=50000

# Reminders — time-based reminders (ISO-8601 fireAt)
# Endpoints: /api/skills/reminders (+ /{id})
app.skills.reminders.enabled=false
app.skills.reminders.storage-dir=memory/reminders
app.skills.reminders.poll-interval-seconds=10

# Watcher — periodically poll URLs and email when availability flips to in-stock
# Adapters: nike-ph (Playwright, for Nike PH product pages), generic-http (regex match)
# Endpoints: /api/skills/watcher (+ /{id}, /{id}/trigger)
# Emails use EmailTools — configure spring.mail.* + app.email.from for SMTP.
app.skills.watcher.enabled=true
app.skills.watcher.storage-dir=memory/watchers
app.skills.watcher.tick-interval-seconds=30
app.skills.watcher.min-interval-seconds=60

# Watch File — single-file mtime / hash / regex watchers, email + webhook alert.
# Endpoints: /api/skills/watch-file (+ /{id}, /{id}/check)
app.skills.watch-file.enabled=true
app.skills.watch-file.storage-dir=memory/watch_files
app.skills.watch-file.tick-interval-seconds=30
app.skills.watch-file.min-interval-seconds=30
app.skills.watch-file.max-content-bytes=10000000

# Watch Folder — event-driven create/modify/delete watcher (Java NIO WatchService),
# optional glob filter + recursive subfolder coverage. Email + webhook alert.
# Endpoints: /api/skills/watch-folder (+ /{id})
app.skills.watch-folder.enabled=true
app.skills.watch-folder.storage-dir=memory/watch_folders
app.skills.watch-folder.debounce-ms=1500

# Watch Disk — alert when a volume's free space drops below a GB threshold
# (edge-triggered: fires once on the flip down and once on recovery).
# Endpoints: /api/skills/watch-disk (+ /{id}, /{id}/check)
app.skills.watch-disk.enabled=true
app.skills.watch-disk.storage-dir=memory/watch_disk
app.skills.watch-disk.tick-interval-seconds=60
app.skills.watch-disk.min-interval-seconds=60

# Watch HTTP — uptime monitor for an HTTP(S) URL. Alerts on up→down or
# down→up flips, and optionally when latency exceeds a threshold.
# Endpoints: /api/skills/watch-http (+ /{id}, /{id}/check)
app.skills.watch-http.enabled=true
app.skills.watch-http.storage-dir=memory/watch_http
app.skills.watch-http.tick-interval-seconds=60
app.skills.watch-http.min-interval-seconds=60
app.skills.watch-http.request-timeout-seconds=12

# Watch Clipboard — fire when the system clipboard changes (any) or when
# its content matches a regex (specific). FX clipboard polling, near-zero cost.
# Endpoints: /api/skills/watch-clipboard (+ /{id})
app.skills.watch-clipboard.enabled=true
app.skills.watch-clipboard.storage-dir=memory/watch_clipboard
app.skills.watch-clipboard.poll-interval-seconds=2
app.skills.watch-clipboard.min-interval-seconds=2

# Timer — named countdown timers in-memory
# Endpoints: /api/skills/timer/{start,{id}/pause,{id}/resume,{id}}
app.skills.timer.enabled=false
app.skills.timer.max-timers=100

# Clipboard History — ring buffer of recent clipboard text entries (desktop only)
# Endpoints: /api/skills/clipboardhistory (+ /search, /{id}/pin)
app.skills.clipboardhistory.enabled=false
app.skills.clipboardhistory.max-entries=100
app.skills.clipboardhistory.poll-interval-ms=1500
app.skills.clipboardhistory.max-entry-chars=100000

# NetInfo — host/interfaces/public IP/DNS/TCP port check
# Endpoints: /api/skills/netinfo/{host,interfaces,public-ip,port,resolve}
app.skills.netinfo.enabled=false
app.skills.netinfo.port-check-timeout-ms=2000
app.skills.netinfo.public-ip-url=https://api.ipify.org
# Restrict port checks to specific hosts (empty = allow any):
# app.skills.netinfo.allowed-port-check-hosts[0]=localhost

