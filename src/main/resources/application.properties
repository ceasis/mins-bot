# App version (auto-incremented build number)
app.version=1.0.@buildNumber@

# Server — bind 0.0.0.0 so mobile devices on the same network can access http://<your-ip>:8765
server.port=${MINS_BOT_PORT:8765}
server.address=${MINS_BOT_BIND:0.0.0.0}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Optional local secrets file (ignored by git). Tried: user home, then working dir, then project root (last wins).
# NOTE: classpath is intentionally NOT included — the template in src/main/resources would override real keys.
spring.config.import=optional:file:${user.home}/application-secrets.properties,optional:file:./application-secrets.properties,optional:file:${user.dir}/application-secrets.properties

# Floating window - collapsed (swirling ball only)
app.window.collapsed.width=45
app.window.collapsed.height=45

# Floating window - expanded (chat UI)
app.window.expanded.width=380
app.window.expanded.height=520

# Initial position (pixels from top-left; -1 = center)
app.window.initial.x=-1
app.window.initial.y=-1

# Window behavior
app.window.always-on-top=true
app.window.hover.expand.delay-ms=150
app.window.hover.collapse.delay-ms=400

# Working sound (dial-up effect) volume: 0.0 = silent, 1.0 = full
app.sound.volume=0.01

# Disable caching for development
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true

# UI URL (relative to server; leave default)
app.ui.path=/

# Google account integrations (OAuth) — prefer the same keys as TelliChat (Spring Security registration):
#   spring.security.oauth2.client.registration.google.client-id
#   spring.security.oauth2.client.registration.google.client-secret
# If those are empty, app.integrations.google.* is used as fallback.
# In Google Cloud → Credentials → your Web client, add BOTH redirect URIs:
#   TelliChat: http://localhost:8080/login/oauth2/code/google  (and production URL if used)
#   Mins Bot:  http://127.0.0.1:${server.port}/api/integrations/google/oauth2/callback
# Tokens: ~/mins_bot_data/google_integrations/tokens.json
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
app.integrations.google.client-id=
app.integrations.google.client-secret=
# app.integrations.google.redirect-uri=http://127.0.0.1:8765/api/integrations/google/oauth2/callback

# ─── Platform Integrations ───────────────────────────────────────────────────
# All webhooks require public HTTPS. Use ngrok for local dev.

# Viber Bot — https://developers.viber.com/docs/api/rest-bot-api/
# Get token: Viber → More → Settings → Bots → Edit Info → Your app key.
app.viber.enabled=false
app.viber.auth-token=
app.viber.bot-name=Mins Bot
app.viber.webhook-url=

# Telegram Bot — https://core.telegram.org/bots/api
# Get token: talk to @BotFather on Telegram → /newbot.
app.telegram.enabled=false
app.telegram.bot-token=
app.telegram.bot-username=MinsBotBot
app.telegram.webhook-url=

# Discord Bot — https://discord.com/developers/docs/intro
# Create app at discord.com/developers/applications. Bot token under Bot tab.
# Set Interactions Endpoint URL to <your-url>/api/discord/interactions.
app.discord.enabled=false
app.discord.bot-token=
app.discord.application-id=
app.discord.public-key=
app.discord.webhook-url=

# Slack Bot — https://api.slack.com/
# Create app at api.slack.com/apps. Enable Events API → Request URL: <your-url>/api/slack/events.
app.slack.enabled=false
app.slack.bot-token=
app.slack.signing-secret=
app.slack.app-token=

# WhatsApp (Meta Cloud API) — https://developers.facebook.com/docs/whatsapp/cloud-api
# Set up in Meta Developer Portal → WhatsApp → Configuration → Callback URL: <your-url>/api/whatsapp/webhook.
app.whatsapp.enabled=false
app.whatsapp.access-token=
app.whatsapp.phone-number-id=
app.whatsapp.verify-token=

# Facebook Messenger — https://developers.facebook.com/docs/messenger-platform
# Set up in Meta Developer Portal → Messenger → Webhooks → Callback URL: <your-url>/api/messenger/webhook.
app.messenger.enabled=false
app.messenger.page-access-token=
app.messenger.verify-token=
app.messenger.app-secret=

# LINE Messaging API — https://developers.line.biz/en/docs/messaging-api/
# Create channel at LINE Developer Console. Webhook URL: <your-url>/api/line/webhook.
app.line.enabled=false
app.line.channel-access-token=
app.line.channel-secret=

# Microsoft Teams (Bot Framework) — https://learn.microsoft.com/en-us/azure/bot-service/
# Register bot in Azure Portal. Messaging endpoint: <your-url>/api/teams/messages.
app.teams.enabled=false
app.teams.app-id=
app.teams.app-password=
app.teams.tenant-id=

# WeChat Official Account — https://developers.weixin.qq.com/doc/offiaccount/en/
# Configure in WeChat Official Account admin. Server URL: <your-url>/api/wechat/webhook.
app.wechat.enabled=false
app.wechat.app-id=
app.wechat.app-secret=
app.wechat.token=
app.wechat.encoding-aes-key=

# Signal (via signal-cli-rest-api) — https://github.com/bbernhard/signal-cli-rest-api
# Requires a running signal-cli-rest-api instance. Configure webhook to: <your-url>/api/signal/webhook.
app.signal.enabled=false
app.signal.api-url=http://localhost:8080
app.signal.phone-number=

# ─── GitHub API Integration ──────────────────────────────────────────────────
# Personal Access Token for GitHub REST API v3. Set via env var or application-secrets.properties.
app.github.token=${GITHUB_TOKEN:}

# ─── Chrome CDP (real browser control) ────────────────────────────────────────
# Connect to the user's real Chrome browser via Chrome DevTools Protocol.
# On first use, Chrome is relaunched with --remote-debugging-port if needed.
app.cdp.enabled=true
app.cdp.port=9222
# Chrome path (empty = auto-detect standard install locations):
# app.cdp.chrome-path=C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe

# ─── Skills ──────────────────────────────────────────────────────────────────
# Skills are portable sub-packages under com.minsbot.skills.<name>.
# Copy the skill package + these properties to add a skill to another instance.

# Disk Scan — browse and search the local file system
# Endpoints: /api/skills/diskscan/*
app.skills.diskscan.enabled=false
app.skills.diskscan.max-depth=20
app.skills.diskscan.max-results=500
# Additional paths to block (beyond built-in OS system paths):
# app.skills.diskscan.blocked-paths[0]=C:\\SensitiveFolder

# ─── Screenshots ─────────────────────────────────────────────────────────────
# Captures desktop every N seconds for screen memory ("what am I watching?"). Keep at 5s for good detection.
app.screenshot.enabled=true
app.screenshot.interval-seconds=5
app.screenshot.max-age-days=3

# ─── Hugging Face (local ONNX models) ─────────────────────────
# Cache directory for downloaded HF models (e.g. suko/nsfw). Only ONNX image models run locally.
app.huggingface.cache-dir=${user.home}/.cache/mins_bot/hf_models

# ─── Web search (searchWeb tool) ───────────────────────────────────────────────
# auto = Serper if serper.api.key set, else SerpAPI if serpapi.api.key set, else DuckDuckGo + Google HTML.
# serper | serpapi | ddg — force one provider (API keys in application-secrets or env SERPER_API_KEY / SERPAPI_API_KEY).
app.web-search.provider=auto
app.web-search.serper-api-key=${serper.api.key:}
app.web-search.serpapi-api-key=${serpapi.api.key:}

# ─── Chat latency tuning ───────────────────────────────────────────────────────
# Live screenshot + Gemini/OCR before replies when the message looks task/screen-related (or is long).
# Simple chat (e.g. "what is your name?") skips prep for speed. Set false to never auto-capture.
# The model can still call takeScreenshot when it needs the screen.
# When planning and/or live-screen run, the UI gets an immediate "One moment…" line first; prep runs in parallel.
app.chat.live-screen-on-message=true
# For faster replies, also consider a quicker chat model in spring.ai.openai.chat.options.model below (e.g. gpt-4o-mini).

# ─── Background agents (Agents tab — parallel ChatClient runs, isolated memory per agent) ───
app.agents.max-concurrent=24

# ─── Task Planning ────────────────────────────────────────────────────────────
# When enabled, an extra LLM call runs first for most messages (>2 words) to build a step plan.
# Set false for noticeably faster replies when you do not need the checklist planner.
app.planning.enabled=true

# ─── Autonomous Mode ─────────────────────────────────────────────────────────
# When enabled, the bot will autonomously work on primary directives after the
# user has been idle for the configured timeout.
app.autonomous.enabled=true
app.autonomous.idle-timeout-seconds=60
app.autonomous.check-interval-ms=15000
app.autonomous.pause-between-steps-ms=30000

# ─── Proactive Engine ────────────────────────────────────────────────────────
# Periodically checks user's life context and pushes helpful notifications
# (morning briefings, break/hydration reminders, bill alerts, meeting prep, etc.)
app.proactive.enabled=false
app.proactive.check-interval-ms=300000
app.proactive.break-reminder-minutes=120
app.proactive.hydration-reminder-minutes=120
app.proactive.morning-briefing-hour=8
app.proactive.quiet-hours-start=22
app.proactive.quiet-hours-end=7
app.proactive.weather-location=Manila

# ─── Proactive Action Mode ───────────────────────────────────────────────────
# Continuously monitors screen, pending tasks, and directives, then takes action.
# Unlike autonomous mode (idle-only), this runs continuously while enabled.
app.proactive-action.enabled=false
app.proactive-action.screen-check-seconds=30
app.proactive-action.task-check-seconds=30
app.proactive-action.directive-check-seconds=60

# ─── Auto-Memory Extraction ──────────────────────────────────────────────────
# Automatically detects life facts from chat (birthdays, relationships, preferences)
# and saves them to episodic memory without being asked.
app.auto-memory.enabled=true

# ─── Email (SMTP send + IMAP read) ────────────────────────────────────────────
# SMTP — used by Spring Mail to send emails
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.email.from=
# IMAP — used to read inbox
app.email.imap.host=
app.email.imap.port=993
app.email.imap.username=
app.email.imap.password=

# ─── Global Hotkeys (JNativeHook) ────────────────────────────────────────────
app.hotkeys.enabled=false

# ─── System Tray ──────────────────────────────────────────────────────────────
app.tray.enabled=true

# ─── Spring AI ────────────────────────────────────────────────────────────────
# API key: set in application-secrets.properties (project root), or use env var OPENAI_API_KEY / SPRING_AI_OPENAI_API_KEY.
# Without a key, the bot falls back to regex-based command matching.
spring.ai.openai.api-key=${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
spring.ai.openai.base-url=https://api.openai.com
# Chat model: gpt-5.1 (flagship), gpt-4o (strong), gpt-4o-mini (faster/cheaper), etc.
spring.ai.openai.chat.options.model=gpt-5.1

# ─── Ollama (local LLMs) ──────────────────────────────────────────────────────
# Use OpenAI for chat by default; LocalModelTools switches to Ollama at runtime when requested.
# Disable Ollama auto-config so we don't get duplicate beans (LocalModelTools creates client on demand).
spring.ai.model.chat=openai
# Install Ollama via the bot ("install ollama") or manually from https://ollama.com

# Tool routing classification model (lightweight AI fallback when regex keywords miss)
app.tool-classifier.model=gpt-4o-mini

# Vision API (GPT-4o screenshot analysis for live screen captures)
# Background periodic captures still use free Windows OCR for daily logs.
# Vision models: primary (accurate), fast (cheap/quick), verify (coordinate confirmation)
app.vision.primary-model=gpt-5.4
app.vision.fast-model=gpt-4o-mini
app.vision.verify-model=gpt-5.4
# Legacy key (used by VisionService as default when no override is passed)
app.vision.model=gpt-5.4
app.vision.detail=high

# Google Gemini Vision (primary vision + reasoning for element detection and verification)
# Set gemini.api.key in application-secrets.properties
app.gemini.api-key=${gemini.api.key:}
app.gemini.model=gemini-2.5-flash
app.gemini.reasoning-model=gemini-2.5-flash
app.gemini.computer-user-interface=gemini-3-flash-preview
app.gemini.computer-user-interface-reasoning=gemini-2.5-flash

# Anthropic Claude Vision (calibration engine)
# Set app.anthropic.api-key in application-secrets.properties (project root) or env var ANTHROPIC_API_KEY
app.claude.api-key=${app.anthropic.api-key:${ANTHROPIC_API_KEY:}}
app.claude.model=claude-opus-4-6

# Gemini Live API (real-time audio translation via WebSocket)
# Uses the same API key as Gemini Vision (app.gemini.api-key).
# When enabled, listen mode streams audio to Gemini for real-time translation
# instead of Whisper + GPT-4o-mini. Falls back automatically if unavailable.
app.gemini-live.enabled=true
app.gemini-live.model=gemini-2.5-flash-native-audio-latest
app.gemini-live.source-language=Filipino/Tagalog

# Google Cloud Document AI (primary cloud OCR — fast, accurate, bounding-box word detection)
# Set up a Document AI processor in GCP Console, then configure below.
app.document-ai.project-id=mins-488318
app.document-ai.location=us
app.document-ai.processor-id=${gcp.docai.processor.id:}
app.document-ai.api-key=${gcp.docai.api.key:}

# AWS Textract (fallback cloud OCR — better than Windows OCR for white text on dark backgrounds)
# Set aws.access.key and aws.secret.key in application-secrets.properties
app.textract.access-key=${aws.access.key:}
app.textract.secret-key=${aws.secret.key:}
app.textract.region=${aws.region:us-east-1}

# AWS Rekognition (label/object/symbol detection — better than Textract for icons, chess pieces)
# Reuses same AWS credentials; override with app.rekognition.* if needed
app.rekognition.access-key=${aws.access.key:}
app.rekognition.secret-key=${aws.secret.key:}
app.rekognition.region=${aws.region:us-east-1}

# Audio transcription (uses raw HTTP — shares the same API key)
app.openai.api-key=${spring.ai.openai.api-key:}
app.openai.base-url=https://api.openai.com/v1
app.openai.transcription-model=gpt-4o-mini-transcribe

# ─── FFmpeg (audio memory MP3 conversion) ─────────────────────────────────────
# Downloaded to ~/mins_bot_data/ffmpeg/ffmpeg.exe on first use (Windows). Override if default URL 404s.
# Example: https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-YYYY-MM-DD/ffmpeg-n8.0-latest-win64-gpl-8.0.zip
app.ffmpeg.download-url=

# ─── Fish Audio (voice / TTS) ──────────────────────────────────────────────────
# API key: fish.audio.api.key in application-secrets.properties or env FISH_AUDIO_API_KEY.
# Voice model id (reference_id) — default is JARVIS voice.
# Set fish.audio.reference.id in application-secrets.properties (or app.fishaudio.reference-id below).
app.fishaudio.enabled=true
app.fishaudio.api-key=${fish.audio.api.key:}
app.fishaudio.reference-id=${fish.audio.reference.id:}
app.fishaudio.model=s2-pro
app.fishaudio.format=pcm
app.fishaudio.sample-rate=24000
# Jarvis-style defaults (match Fish web UI: S2 Pro, speed 1.1x, vol 0, normalizations on)
app.fishaudio.prosody-speed=1.1
app.fishaudio.prosody-volume=0
app.fishaudio.normalize-loudness=true
app.fishaudio.normalize-text=true
app.fishaudio.female-reference-id=
app.fishaudio.male-reference-id=

# ─── ElevenLabs (voice / TTS) ──────────────────────────────────────────────────
# When enabled, TTS uses ElevenLabs instead of Windows SAPI. Set API key and voice ID in application-secrets.properties.
app.elevenlabs.enabled=true
app.elevenlabs.api-key=
app.elevenlabs.voice-id=
app.elevenlabs.model-id=eleven_multilingual_v2
app.elevenlabs.output-format=wav_44100
app.elevenlabs.female-voice-id=EXAVITQu4vr4xnSDxMaL
app.elevenlabs.male-voice-id=pNInz6obpgDQGcFmaJgB

# ─── Barge-in (JARVIS-style interrupt TTS on user speech) ─────────────────────
# While TTS is speaking, watches the mic for user speech and interrupts playback.
# Uses adaptive noise-floor calibration: threshold = max(min-rms, noise-floor × multiplier).
# If you hear TTS cut off unexpectedly → raise threshold-multiplier or min-rms.
# If barge-in doesn't trigger when you speak → lower them.
app.bargein.enabled=true
app.bargein.threshold-multiplier=5.0
app.bargein.min-rms=450
app.bargein.consecutive-frames=3
app.bargein.warmup-ms=300

# ─── Startup Optimization ────────────────────────────────────────────────────
spring.main.lazy-initialization=false
spring.jmx.enabled=false
logging.level.org.springframework.boot.autoconfigure=WARN
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
